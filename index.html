<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reicharon Command Center</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Minecraft Command Dictionary for Cuayo Server">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Theme: Dark Mode vibes -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
</head>
<body>
  <div id="app">Loading Command Center...</div>
  <script>
    window.$docsify = {
      name: 'Reicharon Docs',
      repo: '',
      // Aktifkan Fitur Search
      search: 'auto', 
      search: {
        maxAge: 86400000, // 1 hari
        paths: 'auto',
        placeholder: 'Cari command (ex: tp, spawn, op)...',
        noData: 'Command tidak ditemukan!',
        depth: 6
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugin Search -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
